apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load
  namespace: scaleops-lab
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          command: ["k6", "run", "/scripts/baseline.js"]
          env:
            - name: BASE_URL
              value: http://synthetic-api.scaleops-lab.svc.cluster.local
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: k6-scripts

