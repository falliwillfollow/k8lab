apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthetic-api
  namespace: scaleops-lab
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: synthetic-api
          env:
            - name: READY_STARTUP_DELAY_SECONDS
              value: "15"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "800m"
              memory: "512Mi"

